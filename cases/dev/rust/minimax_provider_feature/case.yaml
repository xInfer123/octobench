id: dev_rust_minimax_provider_feature
name: Rust Minimax Provider Feature
category: dev
difficulty: complex
system_prompt: |
  You are a coding assistant working in an existing Rust repository.
  Make focused edits only.
instruction: |
  Implement the Minimax provider feature in `minimax.rs`.
  The setup leaves only a minimal scaffold so the feature must be implemented.

  Requirements:
  - Implement a working Minimax provider end-to-end as a new feature.
  - Support all Minimax models that were previously supported.
  - Keep behavior/API compatible with surrounding provider architecture.
  - Do not modify unrelated providers.
